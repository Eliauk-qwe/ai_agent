<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eliauk-qwe - 个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            text-align: center;
            color: white;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid white;
            margin: 0 auto 20px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
        }

        .name {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .bio {
            font-size: 16px;
            opacity: 0.9;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            padding: 30px;
            background: #f8f9fa;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }

        .content {
            padding: 40px;
        }

        .section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .projects {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .project-card {
            padding: 20px;
            border: 1px solid #e1e4e8;
            border-radius: 10px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border-color: #667eea;
        }

        .project-name {
            font-size: 16px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 8px;
        }

        .project-lang {
            display: inline-block;
            padding: 4px 12px;
            background: #f1f3f5;
            border-radius: 12px;
            font-size: 12px;
            color: #666;
        }

        .links {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .link-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s;
            font-size: 14px;
        }

        .link-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .skills {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .skill-tag {
            padding: 8px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .stats {
                flex-direction: column;
                gap: 20px;
            }
            
            .projects {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="avatar">E</div>
            <h1 class="name">Eliauk-qwe</h1>
            <p class="bio">热爱编程 | 系统开发 | 算法学习</p>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-number">12</div>
                <div class="stat-label">仓库</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">2</div>
                <div class="stat-label">关注者</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">1</div>
                <div class="stat-label">Stars</div>
            </div>
        </div>

        <div class="content">
            <div class="section">
                <h2 class="section-title">🚀 热门项目</h2>
                <div class="projects">
                    <div class="project-card" onclick="window.open('https://github.com/Eliauk-qwe/Chatroom', '_blank')">
                        <div class="project-name">Chatroom</div>
                        <p style="color: #666; font-size: 14px; margin: 10px 0;">聊天室项目</p>
                        <span class="project-lang">C++</span>
                    </div>
                    <div class="project-card" onclick="window.open('https://github.com/Eliauk-qwe/OS', '_blank')">
                        <div class="project-name">OS</div>
                        <p style="color: #666; font-size: 14px; margin: 10px 0;">操作系统相关项目</p>
                        <span class="project-lang">C</span>
                    </div>
                    <div class="project-card" onclick="window.open('https://github.com/Eliauk-qwe/DS', '_blank')">
                        <div class="project-name">DS</div>
                        <p style="color: #666; font-size: 14px; margin: 10px 0;">数据结构项目</p>
                        <span class="project-lang">C++</span>
                    </div>
                    <div class="project-card" onclick="window.open('https://github.com/Eliauk-qwe/leetcode', '_blank')">
                        <div class="project-name">LeetCode</div>
                        <p style="color: #666; font-size: 14px; margin: 10px 0;">算法练习题解</p>
                        <span class="project-lang">算法</span>
                    </div>
                </div>
            </div>

            <div class="section">
                <h2 class="section-title">💻 技术栈</h2>
                <div class="skills">
                    <span class="skill-tag">C++</span>
                    <span class="skill-tag">C</span>
                    <span class="skill-tag">数据结构</span>
                    <span class="skill-tag">算法</span>
                    <span class="skill-tag">操作系统</span>
                    <span class="skill-tag">网络编程</span>
                </div>
            </div>

            <div class="section">
                <h2 class="section-title">🔗 联系方式</h2>
                <div class="links">
                    <a href="https://github.com/Eliauk-qwe" class="link-btn" target="_blank">

                        </svg>
                        GitHub
                    </a>
                    <a href="https://blog.csdn.net/2401_87494972?spm=1000.2115.3001.5343" class="link-btn" target="_blank">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2L2 7v10c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-10-5z"/>
                        </svg>
                        CSDN博客

                </div>
            </div>
        </div>
    </div>
</body>
</html>
